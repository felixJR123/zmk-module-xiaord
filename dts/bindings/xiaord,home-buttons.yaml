description: |
  Home screen circle button ring configuration.

  Defines which of the 12 fixed clock-position slots are populated,
  what virtual code they fire, what icon they display, and whether
  they navigate to another page on tap.

  Example:

    home_buttons {
        compatible = "xiaord,home-buttons";

        btn_upload {
            position = <0>;
            code = <INPUT_VIRTUAL_SYM_UPLOAD>;
        };
        btn_bt {
            position = <9>;
            code = <INPUT_VIRTUAL_SYM_BLUETOOTH>;
            nav-page = <XIAORD_PAGE_BT>;
        };
    };

compatible: "xiaord,home-buttons"

child-binding:
  description: Single button in the home screen circle ring.
  properties:
    position:
      type: int
      required: true
      description: >
        Clock-position slot index (0–11). 0 = 12 o'clock, 1 = 1 o'clock,
        clockwise in 30-degree steps.

    code:
      type: int
      required: true
      description: >
        Virtual input code fired via ss_fire_behavior() on tap or long-press.
        Use INPUT_VIRTUAL_SYM_* or INPUT_VIRTUAL_ZMK_* from
        dt-bindings/xiaord/input_codes.h.

    symbol:
      type: int
      description: >
        INPUT_VIRTUAL_SYM_* code for the displayed icon. Defaults to the
        value of 'code' when omitted (only valid if code is INPUT_VIRTUAL_SYM_*).

    nav-page:
      type: int
      description: >
        XIAORD_PAGE_* index to navigate to on tap. Omit for no navigation.
